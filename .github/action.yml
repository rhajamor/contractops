name: "ContractOps"
description: "CI-grade behavior contracts and release gates for AI agents."
author: "Ideation Lab"

branding:
  icon: shield
  color: blue

inputs:
  command:
    description: "Command to run: baseline, check, or run"
    required: true
    default: "run"
  scenarios:
    description: "Path to scenario file or directory"
    required: true
  executor:
    description: "Executor to use (mock-v1, mock-v2, openai[:model], anthropic[:model])"
    required: false
    default: ""
  baseline-dir:
    description: "Directory for baseline storage"
    required: false
    default: ".contractops/baselines"
  min-similarity:
    description: "Minimum similarity threshold (0.0-1.0)"
    required: false
    default: "0.85"
  min-score:
    description: "Minimum release score threshold"
    required: false
    default: "80"
  require-baseline:
    description: "Fail if no baseline exists"
    required: false
    default: "false"
  format:
    description: "Output format: markdown, json, junit, github"
    required: false
    default: "github"
  tags:
    description: "Comma-separated tags to filter scenarios"
    required: false
    default: ""
  python-version:
    description: "Python version to use"
    required: false
    default: "3.12"
  post-pr-comment:
    description: "Post results as a PR comment"
    required: false
    default: "true"

outputs:
  passed:
    description: "Whether all contracts passed"
    value: ${{ steps.run.outputs.passed }}
  score:
    description: "Overall release score"
    value: ${{ steps.run.outputs.score }}
  report:
    description: "Full report output"
    value: ${{ steps.run.outputs.report }}

runs:
  using: composite
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}

    - name: Install ContractOps
      shell: bash
      run: pip install -e ${{ github.action_path }}

    - name: Run ContractOps
      id: run
      shell: bash
      env:
        CONTRACTOPS_CMD: ${{ inputs.command }}
        CONTRACTOPS_SCENARIOS: ${{ inputs.scenarios }}
        CONTRACTOPS_EXECUTOR: ${{ inputs.executor }}
        CONTRACTOPS_BASELINE_DIR: ${{ inputs.baseline-dir }}
        CONTRACTOPS_MIN_SIMILARITY: ${{ inputs.min-similarity }}
        CONTRACTOPS_MIN_SCORE: ${{ inputs.min-score }}
        CONTRACTOPS_REQUIRE_BASELINE: ${{ inputs.require-baseline }}
        CONTRACTOPS_FORMAT: ${{ inputs.format }}
        CONTRACTOPS_TAGS: ${{ inputs.tags }}
      run: |
        set +e

        CMD_ARGS=""

        if [ "$CONTRACTOPS_CMD" = "run" ]; then
          CMD_ARGS="run --scenarios $CONTRACTOPS_SCENARIOS"
          if [ -n "$CONTRACTOPS_TAGS" ]; then
            CMD_ARGS="$CMD_ARGS --tags $CONTRACTOPS_TAGS"
          fi
        elif [ "$CONTRACTOPS_CMD" = "check" ]; then
          CMD_ARGS="check --scenario $CONTRACTOPS_SCENARIOS"
        elif [ "$CONTRACTOPS_CMD" = "baseline" ]; then
          CMD_ARGS="baseline --scenario $CONTRACTOPS_SCENARIOS"
        fi

        if [ -n "$CONTRACTOPS_EXECUTOR" ]; then
          CMD_ARGS="$CMD_ARGS --executor $CONTRACTOPS_EXECUTOR"
        fi

        CMD_ARGS="$CMD_ARGS --baseline-dir $CONTRACTOPS_BASELINE_DIR"
        CMD_ARGS="$CMD_ARGS --min-similarity $CONTRACTOPS_MIN_SIMILARITY"
        CMD_ARGS="$CMD_ARGS --min-score $CONTRACTOPS_MIN_SCORE"

        if [ "$CONTRACTOPS_REQUIRE_BASELINE" = "true" ]; then
          CMD_ARGS="$CMD_ARGS --require-baseline"
        fi

        if [ -n "$CONTRACTOPS_FORMAT" ]; then
          CMD_ARGS="$CMD_ARGS --format $CONTRACTOPS_FORMAT"
        fi

        REPORT=$(python -m contractops.cli $CMD_ARGS 2>&1)
        EXIT_CODE=$?

        echo "report<<REPORT_EOF" >> $GITHUB_OUTPUT
        echo "$REPORT" >> $GITHUB_OUTPUT
        echo "REPORT_EOF" >> $GITHUB_OUTPUT

        if [ $EXIT_CODE -eq 0 ]; then
          echo "passed=true" >> $GITHUB_OUTPUT
        else
          echo "passed=false" >> $GITHUB_OUTPUT
        fi

        echo "$REPORT"
        exit $EXIT_CODE

    - name: Post PR comment
      if: inputs.post-pr-comment == 'true' && github.event_name == 'pull_request' && always()
      uses: actions/github-script@v7
      with:
        script: |
          const marker = '<!-- contractops-report -->';
          const report = `${{ steps.run.outputs.report }}`;
          const body = `${marker}\n${report}`;

          const { data: comments } = await github.rest.issues.listComments({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.issue.number,
          });

          const existing = comments.find(c => c.body.includes(marker));

          if (existing) {
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: existing.id,
              body,
            });
          } else {
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
          }
