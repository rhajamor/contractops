name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint
        run: ruff check contractops/ tests/

      - name: Type check
        run: mypy contractops/ --ignore-missing-imports
        if: matrix.python-version == '3.12'

      - name: Test
        run: pytest tests/ -v --tb=short --cov=contractops --cov-report=term-missing

  contract-check:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ContractOps
        run: pip install -e .

      - name: Capture baselines
        run: |
          contractops baseline --scenario examples/customer_refund.json --executor mock-v1
          contractops baseline --scenario examples/security_access_exception.json --executor mock-v1
          contractops baseline --scenario examples/hipaa_data_request.json --executor mock-v1
          contractops baseline --scenario examples/pii_handling.json --executor mock-v1
          contractops baseline --scenario examples/escalation_routing.json --executor mock-v1

      - name: Run contract checks (mock-v1 should pass)
        run: |
          contractops run \
            --scenarios examples/ \
            --executor mock-v1 \
            --format json

      - name: Run contract checks (mock-v2 should fail)
        run: |
          contractops run \
            --scenarios examples/ \
            --executor mock-v2 \
            --format markdown || true
